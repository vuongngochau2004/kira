# K.I.R.A Simplified Development Environment
# Usage: docker compose up -d

services:
  # ===== PostgreSQL with pgvector =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kira-simple-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kira_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kira_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kira} -d ${POSTGRES_DB:-kira_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Qdrant (Vector DB) =====
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kira-simple-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MinIO (Object Storage) =====
  minio:
    image: minio/minio:latest
    container_name: kira-simple-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"   # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-kira_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-kira_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
